<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <nav class="site-nav" aria-label="Primary navigation">
        <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <div class="site-links">
          <a href="{{ '/' | relative_url }}">Paper</a>
          <a href="{{ '/checkpoint_analysis_plan.html' | relative_url }}">Checkpoint Plan</a>
          <a href="{{ '/shared_feature_dynamics_plan.html' | relative_url }}">Feature Plan</a>
          <a href="{{ site.repository_url }}">Repository</a>
        </div>
      </nav>
    </header>
    <main class="page-shell">
      <article class="paper">
        {{ content }}
      </article>
    </main>
    <script type="module">
      import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";

      const blocks = Array.from(document.querySelectorAll("pre > code, .language-mermaid pre code"))
        .filter((block) => block.classList.contains("language-mermaid") || block.closest(".language-mermaid"));
      for (const block of blocks) {
        const container = document.createElement("div");
        container.className = "mermaid";
        container.textContent = block.textContent;
        const source = block.closest(".language-mermaid.highlighter-rouge") || block.parentElement;
        source.replaceWith(container);
      }

      mermaid.initialize({
        startOnLoad: false,
        securityLevel: "strict",
        theme: "base",
        flowchart: {
          htmlLabels: false,
          useMaxWidth: false,
          curve: "basis"
        },
        themeVariables: {
          primaryColor: "#f8fafc",
          primaryBorderColor: "#64748b",
          primaryTextColor: "#111827",
          lineColor: "#475569",
          secondaryColor: "#ecfeff",
          tertiaryColor: "#fef3c7",
          fontFamily: "Inter, ui-sans-serif, system-ui, sans-serif",
          fontSize: "18px"
        }
      });

      if (blocks.length > 0) {
        await mermaid.run({ querySelector: ".mermaid" });
      }
    </script>
  </body>
</html>
