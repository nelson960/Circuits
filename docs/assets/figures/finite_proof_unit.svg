<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Finite proof unit</title>
  <desc id="desc">A finite proof target tracking one internal scalar from actual optimizer update to behavior change and competitor comparison.</desc>
  <rect width="960" height="360" fill="#fbfbf7"/>
  <text x="480" y="42" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#171615">Next finite proof unit</text>
  <text x="480" y="72" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#4a4741">Stop expanding the tool list. Pick one internal scalar C(theta) and close the chain.</text>

  <g font-family="Georgia, serif">
    <rect x="65" y="130" width="170" height="70" rx="8" fill="#eef3fa" stroke="#356aa0" stroke-width="2"/>
    <text x="150" y="159" text-anchor="middle" font-size="20" font-weight="700" fill="#254e77">C(theta_t)</text>
    <text x="150" y="184" text-anchor="middle" font-size="15" fill="#254e77">route before update</text>

    <rect x="285" y="130" width="170" height="70" rx="8" fill="#f3edf7" stroke="#7c5797" stroke-width="2"/>
    <text x="370" y="159" text-anchor="middle" font-size="20" font-weight="700" fill="#573d6b">Delta theta</text>
    <text x="370" y="184" text-anchor="middle" font-size="15" fill="#573d6b">actual update</text>

    <rect x="505" y="130" width="170" height="70" rx="8" fill="#e9f5f0" stroke="#22745a" stroke-width="2"/>
    <text x="590" y="159" text-anchor="middle" font-size="20" font-weight="700" fill="#184f40">Delta C</text>
    <text x="590" y="184" text-anchor="middle" font-size="15" fill="#184f40">route growth</text>

    <rect x="725" y="130" width="170" height="70" rx="8" fill="#f7f1e3" stroke="#9a7a31" stroke-width="2"/>
    <text x="810" y="159" text-anchor="middle" font-size="20" font-weight="700" fill="#5e4a1d">Delta m</text>
    <text x="810" y="184" text-anchor="middle" font-size="15" fill="#5e4a1d">behavior change</text>
  </g>

  <g stroke="#333" stroke-width="2.5" fill="none">
    <path d="M235 165 H285"/>
    <path d="M455 165 H505"/>
    <path d="M675 165 H725"/>
    <path d="M370 200 C425 262 520 262 590 200"/>
  </g>
  <g fill="#333">
    <polygon points="285,165 275,160 275,170"/>
    <polygon points="505,165 495,160 495,170"/>
    <polygon points="725,165 715,160 715,170"/>
    <polygon points="590,200 578,198 584,210"/>
  </g>

  <rect x="145" y="258" width="670" height="58" rx="8" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="480" y="284" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#171615">Delta C ~= grad C(theta_t) dot Delta theta_actual</text>
  <text x="480" y="307" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#4a4741">Then compare against competing C values and repeat across seeds.</text>
</svg>
