<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Circuit formation analysis stack</title>
  <desc id="desc">Overview from dataset and training through candidate analysis and the next geometry phase.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#9d927f"/>
    </marker>
    <style>
      .box { fill:#fffdf8; stroke:#d4c8b5; stroke-width:1.3; rx:8; }
      .next { fill:#f8f4ec; stroke:#cdbfaa; stroke-width:1.3; rx:8; }
      .text { fill:#202124; font-family: Georgia, Palatino, serif; font-size:16px; text-anchor:middle; dominant-baseline:middle; }
      .small { fill:#5a5247; font-family: Georgia, Palatino, serif; font-size:13px; text-anchor:middle; }
      .line { stroke:#9d927f; stroke-width:1.4; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>
  <rect width="960" height="520" fill="#fcfbf8"/>
  <text x="480" y="36" class="text" style="font-size:22px;font-weight:600">From Dataset Relation To Circuit Selection</text>

  <rect class="box" x="70" y="86" width="180" height="64"/>
  <text class="text" x="160" y="110">Stream KV</text>
  <text class="small" x="160" y="132">dataset d(x, y)</text>

  <rect class="box" x="390" y="86" width="180" height="64"/>
  <text class="text" x="480" y="110">Decoder Training</text>
  <text class="small" x="480" y="132">dense checkpoints</text>

  <rect class="box" x="710" y="86" width="180" height="64"/>
  <text class="text" x="800" y="110">Checkpoint Sweep</text>
  <text class="small" x="800" y="132">behavior and windows</text>

  <rect class="box" x="70" y="220" width="180" height="64"/>
  <text class="text" x="160" y="244">Shared Features</text>
  <text class="small" x="160" y="266">families and traces</text>

  <rect class="box" x="390" y="220" width="180" height="64"/>
  <text class="text" x="480" y="244">Gradient Link</text>
  <text class="small" x="480" y="266">candidate update drive</text>

  <rect class="box" x="710" y="220" width="180" height="64"/>
  <text class="text" x="800" y="244">Coalition Map</text>
  <text class="small" x="800" y="266">dense shared neurons</text>

  <rect class="box" x="230" y="354" width="210" height="70"/>
  <text class="text" x="335" y="376">Neuron Intervention</text>
  <text class="small" x="335" y="398">causal family-score support</text>

  <rect class="next" x="520" y="354" width="230" height="70"/>
  <text class="text" x="635" y="376">Geometric Math</text>
  <text class="small" x="635" y="398">attention, paths, gradients</text>

  <path class="line" d="M250 118 H390"/>
  <path class="line" d="M570 118 H710"/>
  <path class="line" d="M800 150 V190 C800 205 785 220 770 220"/>
  <path class="line" d="M710 252 H570"/>
  <path class="line" d="M390 252 H250"/>
  <path class="line" d="M250 252 H390"/>
  <path class="line" d="M570 252 H710"/>
  <path class="line" d="M800 284 C800 332 440 320 400 354"/>
  <path class="line" d="M440 389 H520"/>
  <path class="line" d="M160 284 C160 338 230 338 275 354"/>
</svg>
