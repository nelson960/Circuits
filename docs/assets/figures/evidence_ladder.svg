<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Evidence ladder</title>
  <desc id="desc">A ladder of mechanistic evidence from observation to causal necessity, causal content, update attribution, closure, and replication.</desc>
  <rect width="960" height="520" fill="#fbfbf7"/>
  <text x="480" y="42" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#171615">Evidence ladder</text>
  <text x="480" y="72" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#4a4741">Each level answers a stronger question than the level below it.</text>
  <g font-family="Georgia, serif">
    <g transform="translate(125 405)">
      <rect width="710" height="58" rx="8" fill="#f7eeee" stroke="#9b4b4b" stroke-width="2"/>
      <text x="28" y="36" font-size="20" font-weight="700" fill="#673333">1. Observation</text>
      <text x="250" y="36" font-size="18" fill="#673333">scores rise, heads attend, neurons activate</text>
    </g>
    <g transform="translate(155 340)">
      <rect width="650" height="58" rx="8" fill="#f7f1e3" stroke="#9a7a31" stroke-width="2"/>
      <text x="28" y="36" font-size="20" font-weight="700" fill="#5e4a1d">2. Causal necessity</text>
      <text x="285" y="36" font-size="18" fill="#5e4a1d">removing it hurts behavior</text>
    </g>
    <g transform="translate(185 275)">
      <rect width="590" height="58" rx="8" fill="#eef3fa" stroke="#356aa0" stroke-width="2"/>
      <text x="28" y="36" font-size="20" font-weight="700" fill="#254e77">3. Causal content</text>
      <text x="265" y="36" font-size="18" fill="#254e77">patching transfers key/value information</text>
    </g>
    <g transform="translate(215 210)">
      <rect width="530" height="58" rx="8" fill="#e9f5f0" stroke="#22745a" stroke-width="2"/>
      <text x="28" y="36" font-size="20" font-weight="700" fill="#184f40">4. Update attribution</text>
      <text x="300" y="36" font-size="18" fill="#184f40">actual update grows route</text>
    </g>
    <g transform="translate(245 145)">
      <rect width="470" height="58" rx="8" fill="#f3edf7" stroke="#7c5797" stroke-width="2"/>
      <text x="28" y="36" font-size="20" font-weight="700" fill="#573d6b">5. Closure</text>
      <text x="180" y="36" font-size="18" fill="#573d6b">route growth explains margin</text>
    </g>
    <g transform="translate(275 80)">
      <rect width="410" height="58" rx="8" fill="#eaf3f2" stroke="#39706d" stroke-width="2"/>
      <text x="28" y="36" font-size="20" font-weight="700" fill="#255452">6. Replication</text>
      <text x="225" y="36" font-size="18" fill="#255452">same role across seeds</text>
    </g>
  </g>
  <path d="M100 455 V95" stroke="#333" stroke-width="2.5" fill="none"/>
  <polygon points="100,82 92,98 108,98" fill="#333"/>
  <text x="62" y="278" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#333" transform="rotate(-90 62 278)">stronger evidence</text>
</svg>
