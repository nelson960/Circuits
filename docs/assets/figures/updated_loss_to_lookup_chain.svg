<text x="30.0" y="235.0" class="small" text-anchor="start">The old question was "which neuron matters?" The current proof object is a differentiable route scalar C(theta).</text>
<text x="30.0" y="258.0" class="small" text-anchor="start">Supported: route growth, low-rank QK birth, exact AdamW update reconstruction, and 5-seed role replication.</text>
<text x="30.0" y="281.0" class="small" text-anchor="start">Open: full answer-margin closure and whether the same method scales beyond this symbolic model.</text>
